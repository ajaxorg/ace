
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>Ace Unit Tests</title>
  <style type="text/css" media="screen">

    #log .passed {
        color: green;
    }
    
    #log .failed {
        color: red;
    }
    
    #log pre.error {
        color: black;
    }
    #log  .skipped {
        color: lightblue;
    }
    #sidebar {
        height: calc(100vh - 30px);
        overflow: auto;
        position: absolute;
        right: 10px;
        top: 10px
    }

    #log {
        height: calc(100vh - 30px);
        overflow: auto;
        position: absolute;
        left:10px;

        right:30em;
        top:10px;
    }
    body {
        overflow: scroll;
    }
  </style>
</head>
<body>
    
<div id="log"></div>

<script src="../../demo/kitchen-sink/require.js" ></script>
<script type="text/javascript">
    require.config({
        paths: {
            ace: new URL("../", location).toString()
        },
        packages : [{
            name: "assert",
            location: "./asyncjs",
            main: "assert"
        }]
    });
    define("asyncjs", {})
    require(["ace/test/all_browser"])
</script>


</body>
</html>
